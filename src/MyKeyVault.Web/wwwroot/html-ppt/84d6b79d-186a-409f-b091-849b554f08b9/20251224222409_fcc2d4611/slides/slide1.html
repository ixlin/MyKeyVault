<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>一到冬天就喉咙不舒服咳嗽不断？有可能是“加湿器”在捣鬼！</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #FFFFFF;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px;
        }
        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .content {
            position: relative;
            z-index: 1;
        }
        .tag {
            background: rgba(59, 130, 246, 0.3);
            border: 1px solid #3b82f6;
            color: #60a5fa;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: inline-block;
        }
        h1 {
            font-size: 56px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
            max-width: 900px;
            background: linear-gradient(90deg, #FFFFFF 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 20px;
            color: #94a3b8;
            margin-top: 20px;
        }
        .decoration {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            opacity: 0.6;
        }
        .dot:nth-child(2) { opacity: 0.8; }
        .dot:nth-child(3) { opacity: 1; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="glow-orb"></div>
        <div class="content">
            <div class="tag">AI 智能萃取</div>
            <h1>一到冬天就喉咙不舒服咳嗽不断？有可能是“加湿器”在捣鬼！</h1>
            <p class="subtitle">生成时间：2025年12月24日</p>
        </div>
        <div class="decoration">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
