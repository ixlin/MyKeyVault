<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>人体健康的理想湿度范围</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #FFFFFF;
            overflow: hidden;
        }
        .slide-container {
            width: 100%;
            height: 100%;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 100%);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2d2d3a;
        }
        h2 {
            font-size: 36px;
            font-weight: 700;
        }
        .slide-number {
            font-size: 14px;
            color: #94a3b8;
            background: #12121a;
            padding: 6px 12px;
            border-radius: 6px;
        }
        .chart-container {
            flex: 1;
            background: #12121a;
            border: 1px solid #2d2d3a;
            border-radius: 12px;
            padding: 20px;
        }
        #chart {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <header>
            <h2>人体健康的理想湿度范围</h2>
            <span class="slide-number">3 / 7</span>
        </header>
        <div class="chart-container">
            <div id="chart"></div>
        </div>
    </div>
    <script>
        const chart = echarts.init(document.getElementById('chart'));
        const option = {"backgroundColor":"transparent","title":{"text":"","textStyle":{"color":"#FFFFFF","fontSize":20},"left":"center"},"tooltip":{"trigger":"axis"},"legend":{"textStyle":{"color":"#94a3b8"},"bottom":10},"grid":{"left":"3%","right":"4%","bottom":"15%","containLabel":true},"xAxis":{"type":"category","data":[],"axisLabel":{"color":"#94a3b8"},"axisLine":{"lineStyle":{"color":"#2d2d3a"}}},"yAxis":{"type":"value","axisLabel":{"color":"#94a3b8"},"splitLine":{"lineStyle":{"color":"#2d2d3a","opacity":0.3}}},"series":[]};
        chart.setOption(option);
        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
