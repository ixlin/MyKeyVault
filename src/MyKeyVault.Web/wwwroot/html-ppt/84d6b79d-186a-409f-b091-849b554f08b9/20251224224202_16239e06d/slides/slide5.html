<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>基于RocketMQ的A2A协议实现</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #FFFFFF;
            overflow: hidden;
        }
        .slide-container {
            width: 100%;
            height: 100%;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 100%);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2d2d3a;
        }
        h2 {
            font-size: 36px;
            font-weight: 700;
        }
        .slide-number {
            font-size: 14px;
            color: #94a3b8;
            background: #12121a;
            padding: 6px 12px;
            border-radius: 6px;
        }
        .diagram-container {
            flex: 1;
            background: #12121a;
            border: 1px solid #2d2d3a;
            border-radius: 12px;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }
        .mermaid {
            max-width: 100%;
        }
        .mermaid svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <header>
            <h2>基于RocketMQ的A2A协议实现</h2>
            <span class="slide-number">5 / 9</span>
        </header>
        <div class="diagram-container">
            <pre class="mermaid">graph TD
    A[应用A Supervisor] --&gt;|发送子任务| B[Normal Topic1]
    A --&gt;|发送子任务| C[Normal Topic2]
    B --&gt; D[应用B集群]
    C --&gt; E[应用C集群]
    D --&gt;|发布结果| F[LiteTopic]
    E --&gt;|发布结果| F
    F --&gt; A</pre>
        </div>
    </div>
    <script>
        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            themeVariables: {
                primaryColor: '#3b82f6',
                primaryTextColor: '#FFFFFF',
                primaryBorderColor: '#2d2d3a',
                lineColor: '#60a5fa',
                secondaryColor: '#12121a',
                tertiaryColor: '#1a1a2e'
            }
        });
    </script>
</body>
</html>
