<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>感谢阅读</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #FFFFFF;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .content {
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #FFFFFF;
        }
        .subtitle {
            font-size: 20px;
            color: #94a3b8;
        }
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 14px;
            color: #94a3b8;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="glow-orb"></div>
        <div class="content">
            <h1>感谢阅读</h1>
            <p class="subtitle">由 AI 智能萃取生成</p>
        </div>
        <div class="footer">MyKeyVault · AI 文章萃取 · 2025</div>
    </div>
</body>
</html>
