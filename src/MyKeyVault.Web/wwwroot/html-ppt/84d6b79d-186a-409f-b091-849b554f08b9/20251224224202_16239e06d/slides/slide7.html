<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>实战：三步构建多智能体应用</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1280px;
            height: 720px;
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #FFFFFF;
            overflow: hidden;
        }
        .slide-container {
            width: 100%;
            height: 100%;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 100%);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2d2d3a;
        }
        h2 {
            font-size: 36px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .slide-number {
            font-size: 14px;
            color: #94a3b8;
            background: #12121a;
            padding: 6px 12px;
            border-radius: 6px;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .metrics-row {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: #12121a;
            border: 1px solid #2d2d3a;
            border-radius: 12px;
            padding: 24px 32px;
            flex: 1;
            text-align: center;
        }
        .metric-value {
            font-size: 42px;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 8px;
        }
        .metric-label {
            font-size: 16px;
            color: #94a3b8;
        }
        .bullets {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .bullets li {
            font-size: 22px;
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 16px 20px;
            background: #12121a;
            border-radius: 8px;
            border-left: 3px solid #3b82f6;
        }
        .bullet-icon {
            color: #3b82f6;
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <header>
            <h2>实战：三步构建多智能体应用</h2>
            <span class="slide-number">7 / 9</span>
        </header>
        <div class="main-content">
            
            <ul class="bullets">
                <li><span class="bullet-icon">▸</span>免费一键部署资源访问阿里云体验方案页面，领取免费试用点并自动创建所需云资源</li>
<li><span class="bullet-icon">▸</span>创建Topic和Group按方案要求创建3个Topic和3个Group，配置相应参数</li>
<li><span class="bullet-icon">▸</span>创建并部署智能体应用在阿里云百炼创建天气与行程助手Agent，在ECS部署示例应用程序</li>

            </ul>
        </div>
    </div>
</body>
</html>
