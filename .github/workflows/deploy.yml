# 定义工作流的名称
name: Deploy MyKeyVault to Aliyun Server

# 定义触发条件：当有代码推送到 main 分支时触发
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    # 使用最新的 Ubuntu 虚拟机作为运行环境
    runs-on: ubuntu-latest

    steps:
    # 第一步：检出代码
    # 这个操作会将你的仓库代码下载到虚拟机中
    - name: Checkout code
      uses: actions/checkout@v3

    # 第二步：设置 .NET 环境
    # 我们需要指定一个 .NET 版本来编译你的项目
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x' # 假设你的项目使用 .NET 8, 如果不是，请修改这里

    # 第三步：发布项目
    # 这会编译你的 ASP.NET Core 项目，并生成可部署的文件
    # --configuration Release 指定使用发布模式
    # --output ./publish 指定输出到虚拟机里的 publish 文件夹
    - name: Publish .NET Project
      run: dotnet publish src/MyKeyVault.Web/MyKeyVault.Web.csproj --configuration Release --output ./publish
    
    # 在发布产物中写入当前部署的提交哈希与时间，便于线上核对版本
    - name: Write deploy version file
      run: |
        echo "$GITHUB_SHA" > ./publish/.deploy-version
        date -u +"%Y-%m-%dT%H:%M:%SZ" > ./publish/.deploy-time-utc

    # 第四步：将编译好的文件部署到服务器

    # 第五步：通过 SCP 将发布文件复制到服务器的临时目录（避免目标目录权限问题）
    - name: Copy files to temp via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "./publish/*" # 将 publish 文件夹下的所有内容
        target: "/tmp/mykv_release_${{ github.sha }}" # 复制到服务器的临时目录
        strip_components: 1 # 移除 publish 这一层目录

    # 第六步：在服务器上用 rsync 同步到正式目录，并保护配置文件
    - name: Sync release to target via rsync
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          SRC_DIR="/tmp/mykv_release_${GITHUB_SHA}"
          DEST_DIR="/var/www/mykeyvault/"
          echo "Source: $SRC_DIR"
          echo "Destination: $DEST_DIR"
          
          # 确保目标目录存在
          sudo -n mkdir -p "$DEST_DIR"
          
          # 校验 rsync 是否可用
          if ! command -v rsync >/dev/null 2>&1; then
            echo "ERROR: rsync not installed on remote host" >&2
            exit 1
          fi
          
          # 同步文件到正式目录，排除本地可变配置，避免覆盖线上通过后台保存的配置
          # --delete 保持目录一致；如需保留历史文件，可移除此参数
          sudo -n rsync -a --delete \
            --exclude 'appsettings*.json' \
            "$SRC_DIR/" "$DEST_DIR/"
          
          # 为所有文件提供只读兜底权限（确保服务账户可读）
          sudo -n chmod -R o+r "$DEST_DIR"
          
          # 清理临时目录
          rm -rf "$SRC_DIR"

    # 第七步：在服务器上重启服务
    # 数据库迁移会在应用启动时自动执行（参见 Program.cs）
    - name: Restart Service on Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          echo "Restarting mykeyvault service..."
          # 使用我们之前配置好的免密 sudo 权限来重启服务
          sudo -n systemctl restart mykeyvault.service
          echo "Service restarted successfully!"
          # 检查一下服务状态，确保它正常运行
          sudo systemctl status mykeyvault.service --no-pager
          echo "Recent service logs:"
          journalctl -u mykeyvault.service -n 30 --no-pager || true
          echo "Deployed commit:"
          cat /var/www/mykeyvault/.deploy-version || true
          echo "Deploy time (UTC):"
          cat /var/www/mykeyvault/.deploy-time-utc || true
